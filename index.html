<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keith</title>
  <script>
    const t = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', t);
  </script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0d0d0d;
      --surface: #141414;
      --border: #222;
      --text: #e8e8e8;
      --muted: #666;
      --accent: #c8a96e;
      --text-secondary: #b0b0b0;
    }

    [data-theme="light"] {
      --bg: #f8f6f2;
      --surface: #eeecea;
      --border: #e0ddd8;
      --text: #1a1a1a;
      --muted: #999;
      --accent: #c8a96e;
      --text-secondary: #555;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Georgia', serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      transition: background 0.2s, color 0.2s;
    }

    main {
      max-width: 560px;
      width: 100%;
    }

    .name {
      font-size: clamp(2rem, 6vw, 3.25rem);
      font-weight: normal;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 0.5rem;
    }

    .tagline {
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      color: var(--accent);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 2.5rem;
    }

    .divider {
      width: 2rem;
      height: 1px;
      background: var(--border);
      margin-bottom: 2.5rem;
    }

    .bio {
      font-size: 1.05rem;
      line-height: 1.75;
      color: var(--text-secondary);
      margin-bottom: 3rem;
    }

    .bio a {
      color: var(--text);
      text-decoration: underline;
      text-decoration-color: var(--border);
      transition: text-decoration-color 0.2s;
    }

    .bio a:hover {
      text-decoration-color: var(--accent);
    }

    .links {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .links a {
      font-family: 'Courier New', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .links a:hover {
      color: var(--text);
    }

    .theme-toggle {
      position: fixed;
      top: 1.25rem;
      right: 1.5rem;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      color: var(--muted);
      padding: 0.25rem;
      line-height: 1;
      transition: color 0.2s;
    }

    .theme-toggle:hover {
      color: var(--text);
    }
  </style>
</head>
<body>
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle light/dark mode"></button>
  <main>
    <h1 class="name">Keith</h1>
    <p class="tagline">Operator &amp; Investor</p>
    <div class="divider"></div>
    <p class="bio">
      I build and back companies. Focused on finding and working with exceptional founders,
      and on creating value through operational discipline and long-term thinking.
      Open to conversations about new ventures and investments.
    </p>
    <nav class="links">
      <a href="mailto:keith@swift.vc">Email</a>
      <a href="https://linkedin.com/in/keitheadie">LinkedIn</a>
      <a href="projects.html">Projects</a>
    </nav>
  </main>
  <script>
    const btn = document.getElementById('themeToggle');

    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      btn.textContent = theme === 'dark' ? '☀' : '☾';
      localStorage.setItem('theme', theme);
    }

    applyTheme(localStorage.getItem('theme') || 'dark');

    btn.addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      applyTheme(current === 'dark' ? 'light' : 'dark');
    });
  </script>
</body>
</html>
